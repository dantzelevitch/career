SCORING SYSTEM PROPOSAL (NOT YET IMPLEMENTED)

PROPOSED ADDITIVE SYSTEM:
  For each career:
    Q1 = world points (0 = DISQUALIFIED)
    Q2 = sum ALL matching strength tags (0 = DISQUALIFIED)
    Q3 = sum ALL matching workplace tags (0 = DISQUALIFIED)
    Q4 = sum all matching tags x 100%
    Q5 = sum all matching tags x 70%
    Q6 = matching tag x 60%
    Q7 = sum all matching tags x 70%
    Q8 = matching tag x 50%
    Score = Q1 + Q2 + Q3 + Q4 + Q5 + Q6 + Q7 + Q8

  KEY CHANGES FROM CURRENT:
  - Sum ALL matching tags instead of taking highest
  - Purely additive instead of multiplicative
  - Q1/Q2/Q3 zero = disqualification gate (same as current)
  - Max score per question always 10 regardless of tag count
  - Weights on Q5-Q8 reduce influence of uncertain preferences

  CURRENT SYSTEM (keeping for now):
  Final = (Q2 x 1.0) x (Q3 x 0.8) x (Q4x2 + Q5 + Q6 + Q7 + Q8) x World
  - Takes HIGHEST matching tag per question
  - Multiplicative gates on Q1, Q2, Q3
  - Q4 additive with 2x weight
*/

const PointDistributor = ({opts, points, setPoints, maxPts=10, maxActive=0}) => {
  const total = Object.values(points).reduce((a,b)=>a+b,0);
  const remaining = maxPts - total;
  const activeCount = Object.values(points).filter(v => v > 0).length;
  return (
    <div>
      {opts.map(o => {
        const val = points[o.key] || 0;
        const isActive = val > 0;
        const isLocked = maxActive > 0 && !isActive && activeCount >= maxActive;
        return (
        <div key={o.key} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"12px 14px",background:isLocked?"#151d27":"#1A2332",borderRadius:14,border:`2px solid ${isActive?"#4ECDC4":isLocked?"#1A2332":"#2A3442"}`,opacity:isLocked?0.4:1,transition:"opacity 0.3s ease"}}>
          <span style={{fontSize:24,flexShrink:0}}>{o.emoji}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:600,color:isActive?"#F0F4F8":"#B0BAC5",lineHeight:1.3}}>{o.label}</div>
            {o.sub&&<div style={{fontSize:13,color:"#6B7B8D",lineHeight:1.3,marginTop:2}}>{o.sub}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <button onClick={()=>{if(val>0)setPoints({...points,[o.key]:val-1})}} style={{width:36,height:36,borderRadius:10,border:"none",background:val>0?"#2A3442":"#1A2332",color:val>0?"#F0F4F8":"#3A4452",fontSize:20,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>−</button>
            <span style={{fontSize:22,fontWeight:800,color:val>0?"#4ECDC4":"#5A6A7A",minWidth:28,textAlign:"center"}}>{val}</span>
            <button onClick={()=>{if(remaining>0 && !isLocked)setPoints({...points,[o.key]:val+1})}} style={{width:36,height:36,borderRadius:10,border:"none",background:(remaining>0 && !isLocked)?"#2A3442":"#1A2332",color:(remaining>0 && !isLocked)?"#F0F4F8":"#3A4452",fontSize:20,fontWeight:700,cursor:isLocked?"not-allowed":"pointer",fontFamily:"inherit"}}>+</button>
          </div>
        </div>
        );
      })}
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:8,paddingRight:14}}>
        <span style={{fontSize:14,color:"#6B7B8D",marginRight:8}}>{remaining>0?"remaining":""}</span>
        <span style={{fontSize:22,fontWeight:800,color:remaining===0?"#4ECDC4":"#FF6B6B",minWidth:28,textAlign:"center"}}>{remaining}</span>
      </div>
    </div>
  );
};

  const [copied, setCopied] = useState(false);
  const [showAll, setShowAll] = useState(false);
  const [fadeIn, setFadeIn] = useState(true);
  const [scoringModel, setScoringModel] = useState("new");
  const [showInterstitial, setShowInterstitial] = useState(false);
  const [showConfirmation, setShowConfirmation] = useState(false);

  const go = (s) => { setFadeIn(false); setTimeout(()=>{setScreen(s);setFadeIn(true);},200); };
  const pts = answers[Q_CONFIG[qIdx]?.id] || {};
  const total = Object.values(pts).reduce((a,b)=>a+b,0);

  const score = () => {
    const a = answers;
    const q1 = a.q1 || {};
    let all = [];
    let log = "═══════════════════════════════════\n  FIND YOUR PATH — RESULTS LOG\n═══════════════════════════════════\n\n";
    log += "YOUR ANSWERS\n───────────────────────────────────\n";
    Q_CONFIG.forEach(q => {
      log += `${q.label}:\n`;
      q.opts.forEach(o => { const v=a[q.id]?.[o.key]||0; if(v>0) log+=`  ${o.emoji} ${o.label}: ${v} pts\n`; });
    });
    log += "\n";

    CAREERS.forEach(c => {
      const wPts = c.w === "U" ? Math.max(...Object.values(q1).filter(v=>v>0), 0) : (q1[c.w] || 0);
      if (wPts === 0) return;

      // Redistribute indifferent points evenly across real options
      const adjustQ = (qKey, realKeys) => {
        const qA = a[qKey] || {};
        const indiffPts = qA.indiff || 0;
        const spread = realKeys.length > 0 ? indiffPts / realKeys.length : 0;
        const adjusted = {};
        realKeys.forEach(k => { adjusted[k] = (qA[k] || 0) + spread; });
        return adjusted;
      };

      // CLASSIC: takes highest matching tag
      const best = (tags, qKey) => {
        const qA = a[qKey] || {};
        return Math.max(...tags.map(t => qA[t] || 0), 0);
      };

      // NEW: sums ALL matching tags
      const sumAll = (tags, qKey) => {
        const qA = a[qKey] || {};
        return tags.reduce((sum, t) => sum + (qA[t] || 0), 0);
      };

      const a5 = adjustQ("q5", ["steady","mod","high"]);
      const a6 = adjustQ("q6", ["see","removed"]);
      const a7 = adjustQ("q7", ["money","enjoy","matter"]);
      const a8 = {stays: (a.q8?.stays || 0), allin: (a.q8?.allin || 0)};

      // === CLASSIC SCORING ===
      const cs2=best(c.q2,"q2"), cs3=best(c.q3,"q3"), cs4=best(c.q4,"q4");
      const cs5=Math.max(...c.q5.map(t => a5[t] || 0), 0);
      const cs6=a6[c.q6]||0;
      const cs7=Math.max(...c.q7.map(t => a7[t] || 0), 0);
      const cs8=a8[c.q8]||0;
      const cPrefSum = cs4*2+cs5+cs6+cs7+cs8;
      const classicScore = (cs2 * 1.0) * (cs3 * 0.8) * cPrefSum * wPts;

      // === NEW ADDITIVE SCORING ===
      const ns2=sumAll(c.q2,"q2");
      const ns3=best(c.q3,"q3");
      const ns4=sumAll(c.q4,"q4");
      const ns5=Math.max(...c.q5.map(t => a5[t] || 0), 0);
      const ns6=a6[c.q6]||0;
      const ns7=c.q7.reduce((sum, t) => sum + (a7[t] || 0), 0);
      const ns8=a8[c.q8]||0;
      // Disqualify if Q2 or Q3 sum is 0
      // Also disqualify if ANY career Q2 tag is not in selectedStrengths
      const activeStrengths = Object.entries(a.q2 || {}).filter(([k,v]) => v > 0).map(([k]) => k);
      const strengthsMatch = activeStrengths.length > 0 ? c.q2.every(t => activeStrengths.includes(t)) : true;
      if (ns2 === 0 || ns3 === 0 || !strengthsMatch) {
        // Still push with 0 new score so classic can show it
      }
      const newScore = (ns2 === 0 || ns3 === 0 || !strengthsMatch) ? 0 :
        (wPts*1.2) + (ns2*2.0) + ns3 + ns4 + ns5 + ns6 + (ns7*0.75) + ns8;

      all.push({name:c.n, world:c.w, score:classicScore, newScore, prefSum:cPrefSum, wPts,
        s2:cs2,s3:cs3,s4:cs4,s5:cs5,s6:cs6,s7:cs7,s8:cs8,
        ns2,ns3,ns4,ns5,ns6,ns7,ns8,
        q2t:c.q2,q3t:c.q3,q4t:c.q4,q5t:c.q5,q6t:c.q6,q7t:c.q7,q8t:c.q8, majors:MAJORS[c.n]||[], ed:EDTIER[c.n]||'y', ai:AI_RISK.has(c.n)});
    });

    // Sort by classic score for initial display
    all.sort((a,b) => b.score - a.score);

    // Create two sorted arrays
    const classicSorted = [...all].sort((a,b) => b.score - a.score).filter(c => c.score > 0);
    const newSorted = [...all].sort((a,b) => b.newScore - a.newScore).filter(c => c.newScore > 0);

    log += "═══════════════════════════════════\n  CAREER SCORES — CLASSIC MODEL (Top 50)\n═══════════════════════════════════\n\n";
    classicSorted.slice(0,50).forEach((c,i) => {
      const wObj = WORLDS.find(w=>w.id===c.world) || {emoji:"🌐",label:"Universal"};
      log += `${String(i+1).padStart(2)}. ${c.score.toFixed(0).padStart(4)}  ${c.name} ${wObj.emoji}\n`;
      log += `     Q2:${c.s2}×1.0 × Q3:${c.s3}×0.8 × Prefs:${c.prefSum} × W:${c.wPts} (Q4:${c.s4}×2 Q5:${c.s5} Q6:${c.s6} Q7:${c.s7} Q8:${c.s8})\n`;
      log += `     Tags: ${c.q2t}|${c.q3t}|${c.q4t}|${c.q5t}|${c.q6t}|${c.q7t}|${c.q8t}\n`;
      log += `     Study: ${(c.majors||[]).join(', ')}\n\n`;
    });

    log += "\n═══════════════════════════════════\n  CAREER SCORES — NEW MODEL (Top 50)\n═══════════════════════════════════\n\n";
    newSorted.slice(0,50).forEach((c,i) => {
      const wObj = WORLDS.find(w=>w.id===c.world) || {emoji:"🌐",label:"Universal"};
      log += `${String(i+1).padStart(2)}. ${c.newScore.toFixed(1).padStart(5)}  ${c.name} ${wObj.emoji}\n`;
      log += `     W:${c.wPts}×1.2 + Q2:${c.ns2}×1.4(sum) + Q3:${c.ns3}(best) + Q4:${c.ns4}(sum) + Q5:${c.ns5} + Q6:${c.ns6} + Q7:${c.ns7}(sum) + Q8:${c.ns8}\n`;
      log += `     Tags: ${c.q2t}|${c.q3t}|${c.q4t}|${c.q5t}|${c.q6t}|${c.q7t}|${c.q8t}\n`;
      log += `     Study: ${(c.majors||[]).join(', ')}\n\n`;
    });
    log += `\nTOTAL CAREERS SCORED: ${all.length}\n`;

    setResults({classic: classicSorted, new: newSorted, all});
    setLogText(log);
  };

  const cs = {minHeight:"100dvh",background:"#0F1923",color:"#F0F4F8",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",opacity:fadeIn?1:0,transition:"opacity 0.2s ease"};

  if (screen==="splash") return (
    <div style={cs}>
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",padding:"40px 24px",textAlign:"center"}}>
        <img src="https://dantzelevitch.github.io/career/assets/blink_logo.png" alt="Blink" style={{width:100,height:100,margin:"0 auto 16px",borderRadius:20}} />
        <h1 style={{fontSize:32,fontWeight:800,marginBottom:14,lineHeight:1.2}}>Blink: Career</h1>
        <p style={{fontSize:18,color:"#8B95A5",lineHeight:1.5,marginBottom:44}}>8 questions. 5 minutes. Find out what you're built for.</p>
        <button onClick={()=>go("quiz")} style={{width:100,height:100,borderRadius:"50%",border:"none",background:"linear-gradient(135deg,#4ECDC4,#44B8B0)",color:"#0F1923",fontSize:24,fontWeight:800,cursor:"pointer",fontFamily:"inherit",margin:"0 auto",letterSpacing:1}}>GO</button>
      </div>
    </div>
  );

  if (screen==="quiz") {
    const q = Q_CONFIG[qIdx];
    const isLastQ = qIdx === Q_CONFIG.length - 1;
    const isFirstQ = qIdx === 0;
    const isPreLastQ = qIdx === Q_CONFIG.length - 2;

    // Confirmation modal after first question (Strengths)
    if (showConfirmation) {
      const strengthPts = answers.q2 || {};
      const sorted = Object.entries(strengthPts).filter(([k,v]) => v > 0 && k !== "indiff").sort((a,b) => b[1] - a[1]);
      const primary = sorted[0];
      const secondaries = sorted.slice(1);
      const primaryText = primary ? CONFIRM_WORDS[primary[0]]?.primary : "";
      let secondaryText = "";
      if (secondaries.length === 1) {
        const w = CONFIRM_WORDS[secondaries[0][0]]?.secondary;
        secondaryText = "And very " + w + " too.";
      } else if (secondaries.length >= 2) {
        const w1 = CONFIRM_WORDS[secondaries[0][0]]?.secondary;
        const w2 = CONFIRM_WORDS[secondaries[1][0]]?.secondary;
        secondaryText = (w1 === "a people person" ? "A people person" : w1.charAt(0).toUpperCase() + w1.slice(1)) + ", and very " + w2 + " too.";
        // Fix: if first secondary needs "Very" prefix
        if (w1 !== "a people person") {
          secondaryText = "Very " + w1 + ", and very " + w2 + " too.";
        }
      }
      // Handle ties for primary
      if (sorted.length >= 2 && sorted[0][1] === sorted[1][1]) {
        const w2 = CONFIRM_WORDS[sorted[1][0]]?.secondary;
        const tieText = w2 === "a people person" ? "And very much a people person too." : "And very " + w2 + " too.";
        secondaryText = tieText;
      }
      return (
        <div style={cs}>
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"40px 30px",textAlign:"center"}}>
            <h2 style={{fontSize:26,fontWeight:700,color:"#F0F4F8",marginBottom:16,lineHeight:1.4}}>{primaryText}</h2>
            {secondaryText && <p style={{fontSize:18,color:"#8B95A5",marginBottom:40}}>{secondaryText}</p>}
            <div style={{display:"flex",gap:12,width:"100%"}}>
              <button onClick={()=>{setShowConfirmation(false);}} style={{padding:"16px 24px",borderRadius:14,border:"2px solid #2A3442",background:"transparent",color:"#8B95A5",fontSize:16,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Let me adjust ←</button>
              <button onClick={()=>{setShowConfirmation(false);setQIdx(qIdx+1);}} style={{flex:1,padding:"16px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#4ECDC4,#44B8B0)",color:"#0F1923",fontSize:18,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>That's me →</button>
            </div>
          </div>
        </div>
      );
    }

    // Interstitial before last question (Worlds)
    if (showInterstitial) {
      return (
        <div style={cs}>
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"40px 30px",textAlign:"center"}}>
            <h2 style={{fontSize:28,fontWeight:700,color:"#F0F4F8",marginBottom:16,lineHeight:1.4}}>One more.</h2>
            <p style={{fontSize:20,color:"#8B95A5",marginBottom:40}}>This one counts — take your time.</p>
            <button onClick={()=>{setShowInterstitial(false);setQIdx(Q_CONFIG.length-1);}} style={{width:"100%",padding:"18px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#4ECDC4,#44B8B0)",color:"#0F1923",fontSize:18,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>I'm ready →</button>
          </div>
        </div>
      );
    }

    return (
      <div style={cs}>
        <div style={{width:"100%",padding:"16px 20px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13,color:"#6B7B8D"}}>
            <span>Question {qIdx+1} of {Q_CONFIG.length}</span>
            
          </div>
          <div style={{width:"100%",height:5,background:"#1A2332",borderRadius:3}}>
            <div style={{width:`${((qIdx+1)/Q_CONFIG.length)*100}%`,height:"100%",background:"linear-gradient(90deg,#4ECDC4,#44B8B0)",borderRadius:3,transition:"width 0.4s ease"}}/>
          </div>
        </div>
        <div style={{flex:1,padding:"20px 20px 24px",display:"flex",flexDirection:"column"}}>
          
          <h2 style={{fontSize:24,fontWeight:700,marginBottom:6,lineHeight:1.3}}>{q.q}</h2>
          <p style={{fontSize:14,color:"#6B7B8D",marginBottom:20}}>{q.sub}</p>
          <div style={{flex:1,overflowY:"auto"}}>
            <PointDistributor opts={q.opts} points={pts} setPoints={p=>setAnswers({...answers,[q.id]:p})} maxActive={isFirstQ?3:0} />
          </div>
          <div style={{display:"flex",gap:10,marginTop:12}}>
            {qIdx>0&&<button onClick={()=>{if(isLastQ){setShowInterstitial(false);setQIdx(qIdx-1);}else{setQIdx(qIdx-1);}}} style={{padding:"16px 24px",borderRadius:14,border:"2px solid #2A3442",background:"transparent",color:"#8B95A5",fontSize:16,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← Back</button>}
            <button onClick={()=>{
              if(isFirstQ){setShowConfirmation(true);}
              else if(isPreLastQ){setShowInterstitial(true);}
              else if(isLastQ){score();go("results");}
              else{setQIdx(qIdx+1);}
            }} disabled={total!==10} style={{flex:1,padding:"16px",borderRadius:14,border:"none",background:total===10?"linear-gradient(135deg,#4ECDC4,#44B8B0)":"#2A3442",color:total===10?"#0F1923":"#5A6A7A",fontSize:18,fontWeight:700,cursor:total===10?"pointer":"not-allowed",fontFamily:"inherit"}}>
              {isLastQ?"See my results →":"Continue →"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (screen==="results") {
    // Select results based on scoring model
    const activeResults = scoringModel === "new" ? (results.new || []) : (results.classic || []);
    const scoreKey = scoringModel === "new" ? "newScore" : "score";

    // Calculate top majors from top 10
    const top10 = activeResults.slice(0, 10);
    const majorCounts = {};
    top10.forEach(c => {
      const m = c.majors || [];
      const s = c[scoreKey];
      if (m[0]) majorCounts[m[0]] = (majorCounts[m[0]] || 0) + s * 2;
      if (m[1]) majorCounts[m[1]] = (majorCounts[m[1]] || 0) + s * 1;
    });
    const sortedMajors = Object.entries(majorCounts).sort((a,b) => b[1] - a[1]);
    const topMajor = sortedMajors[0];
    const topMinor = sortedMajors[1];
    const thirdMajor = sortedMajors[2];

    return (
      <div style={cs}>
        <div style={{padding:"32px 20px 24px"}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontSize:56,marginBottom:14}}>🎯</div>
            <h2 style={{fontSize:28,fontWeight:800,marginBottom:10,lineHeight:1.2}}>Your Career Matches</h2>
            <p style={{fontSize:16,color:"#8B95A5",lineHeight:1.5}}>Your top careers ranked by fit.</p>
          </div>

          {/* Scoring Model Toggle */}
          <div style={{display:"flex",gap:8,marginBottom:20,justifyContent:"center"}}>
            <button onClick={()=>{setScoringModel("classic");setShowAll(false);}} style={{
              padding:"8px 16px",borderRadius:20,border:"1px solid #2A3442",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
              background:scoringModel==="classic"?"#4ECDC420":"#1A2332",
              color:scoringModel==="classic"?"#4ECDC4":"#5A6A7A"
            }}>Classic Model</button>
            <button onClick={()=>{setScoringModel("new");setShowAll(false);}} style={{
              padding:"8px 16px",borderRadius:20,border:"1px solid #2A3442",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
              background:scoringModel==="new"?"#F39C1220":"#1A2332",
              color:scoringModel==="new"?"#F39C12":"#5A6A7A"
            }}>New Model</button>
          </div>

          {/* Major Recommendation */}
          {topMajor && (
            <div style={{marginBottom:24,padding:"18px",background:"linear-gradient(135deg,#4ECDC415,#44B8B015)",borderRadius:16,border:"1px solid #4ECDC440"}}>
              <p style={{fontSize:13,color:"#4ECDC4",fontWeight:600,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>🎓 Recommended Path</p>
              <p style={{fontSize:17,color:"#F0F4F8",lineHeight:1.5}}>
                Recommended areas of study:{" "}
                <span style={{fontWeight:700,color:"#4ECDC4"}}>{topMajor[0]}</span>
                {topMinor && <>, <span style={{fontWeight:700,color:"#4ECDC4"}}>{topMinor[0]}</span></>}
              </p>
              {thirdMajor && (
                <p style={{fontSize:14,color:"#8B95A5",marginTop:8}}>Also consider: {thirdMajor[0]}</p>
              )}
            </div>
          )}

          {/* Results list with tied ranks */}
          <div style={{marginBottom:24}}>
            {(() => {
              const shown = showAll ? activeResults : activeResults.slice(0, 20);
              let rank = 1;
              return shown.map((c, i) => {
                const wObj = WORLDS.find(w=>w.id===c.world)||{emoji:"🌐"};
                const m = c.majors || [];
                if (i > 0 && c[scoreKey] < shown[i-1][scoreKey]) rank = i + 1;
                return (
                  <div key={i} style={{padding:"10px 12px",borderBottom:"1px solid #1A2332"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,fontSize:15}}>
                      <span style={{color:"#5A6A7A",fontSize:13,minWidth:26,textAlign:"right"}}>{rank}.</span>
                      <span style={{fontSize:13}}>{wObj.emoji}</span>
                      <span style={{flex:1,color:"#D0D8E0",fontWeight:500}}>{c.name}</span>
                      {c.ai && <span style={{fontSize:11,color:"#F39C12"}}>AI Risk</span>}
                      <span style={{fontSize:12}}>{c.ed==='n'?'':c.ed==='g'?'🎓':c.ed==='y'?'🎓🎓':c.ed==='r'?'🎓🎓🎓':''}</span>
                    </div>
                    {m.length > 0 && (
                      <div style={{marginLeft:50,marginTop:3,fontSize:12,color:"#6B7B8D"}}>
                        → {m.join(", ")}
                      </div>
                    )}
                  </div>
                );
              });
            })()}
            {!showAll && activeResults.length > 20 && (
              <button onClick={()=>setShowAll(true)} style={{
                width:"100%",padding:"14px",borderRadius:14,border:"1px solid #2A3442",
                background:"#1A2332",color:"#8B95A5",fontSize:16,fontWeight:600,
                cursor:"pointer",fontFamily:"inherit",marginTop:12
              }}>
                See 20 more ↓
              </button>
            )}
            {showAll && (
              <button onClick={()=>setShowAll(false)} style={{
                width:"100%",padding:"14px",borderRadius:14,border:"1px solid #2A3442",
                background:"#1A2332",color:"#8B95A5",fontSize:16,fontWeight:600,
                cursor:"pointer",fontFamily:"inherit",marginTop:12
              }}>
                Show less ↑
              </button>
            )}
          </div>
            );
          })}

          <div style={{marginTop:16,padding:"16px",background:"#1A2332",borderRadius:14,border:"1px solid #2A3442"}}>
            <p style={{fontSize:14,color:"#8B95A5",lineHeight:1.5,textAlign:"center"}}>These are starting points, not limits. Even lower-ranked careers could be your dream — the scores reflect today's preferences.</p>
          </div>

          <div style={{marginTop:16}}>
            <button onClick={()=>setShowLog(!showLog)} style={{width:"100%",padding:"14px",borderRadius:14,border:"1px solid #2A3442",background:"#1A2332",color:"#8B95A5",fontSize:16,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>
              {showLog?"Hide":"Show"} detailed log 📋
            </button>
            {showLog&&(
              <div style={{marginBottom:10}}>
                <button onClick={()=>{navigator.clipboard.writeText(logText).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});}} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:copied?"#27AE60":"#2A3442",color:copied?"#FFF":"#8B95A5",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all 0.3s ease",marginBottom:10}}>
                  {copied?"Copied! ✓":"Copy log to clipboard 📋"}
                </button>
                <pre style={{background:"#0A1018",border:"1px solid #1A2332",borderRadius:12,padding:16,fontSize:12,lineHeight:1.5,color:"#8B95A5",whiteSpace:"pre-wrap",wordBreak:"break-word",overflow:"auto",maxHeight:500,fontFamily:"'SF Mono','Fira Code','Consolas',monospace"}}>{logText}</pre>
              </div>
            )}
          </div>

          <button onClick={()=>{setAnswers({});setQIdx(0);setResults([]);setLogText("");setShowLog(false);setCopied(false);setShowAll(false);go("splash");}} style={{width:"100%",padding:"16px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#4ECDC4,#44B8B0)",color:"#0F1923",fontSize:18,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginTop:10}}>Start over 🔄</button>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<CareerQuiz />);
</script>
</body>
</html>
